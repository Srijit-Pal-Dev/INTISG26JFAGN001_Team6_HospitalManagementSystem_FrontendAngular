<div class="add-medicine">
  <h2 class="page-title">{{ isEdit ? 'Edit' : 'Add' }} Medicine</h2>

  <form class="medicine-form card" [formGroup]="form" (ngSubmit)="submit()">
    <div class="form-grid">

      <!-- Left column -->
      <div class="col">
        <div class="form-group">
          <label>Medicine Name:</label>
          <input formControlName="name" placeholder="e.g. Paracetamol" [class.invalid]="invalid('name')" />
        </div>
        <div class="form-group">
          <label>Category:</label>
          <input formControlName="category" placeholder="e.g. Analgesic" [class.invalid]="invalid('category')" />
        </div>
        <div class="form-group">
          <label>Manufacturer:</label>
          <input formControlName="manufacturer" placeholder="e.g. GSK" [class.invalid]="invalid('manufacturer')" />
        </div>
        <div class="form-group">
          <label>Unit:</label>
          <div class="select-wrapper" [class.invalid]="invalid('unit')">
            <select formControlName="unit">
              <option value="" disabled>Select unit...</option>
              <option *ngFor="let u of unitOptions" [value]="u">{{ u }}</option>
              <option value="Other">Other</option>
            </select>
            <i class="fas fa-chevron-down select-arrow"></i>
          </div>
        </div>
        <div class="form-group" *ngIf="form.get('unit')?.value === 'Other'">
          <label>Specify Unit:</label>
          <input formControlName="customUnit" placeholder="Enter unit name" [class.invalid]="invalid('customUnit')" />
        </div>
      </div>

      <!-- Right column -->
      <div class="col">
        <div class="form-group">
          <label>Medicine Id:</label>
          <input placeholder="Auto-generated" disabled class="disabled-field" />
        </div>
        <div class="form-group">
          <label>Dosage Strength:</label>
          <input formControlName="dosageStrength" placeholder="e.g. 500mg" [class.invalid]="invalid('dosageStrength')" />
        </div>
        <div class="form-group">
          <label>Price per Unit:</label>
          <input formControlName="pricePerUnit" type="number" min="0.01" step="0.01"
            placeholder="e.g. 12.50" [class.invalid]="invalid('pricePerUnit')" />
        </div>
        <div class="form-group">
          <label>Stock Quantity:</label>
          <input formControlName="stockQuantity" type="number" min="0"
            placeholder="e.g. 100" [class.invalid]="invalid('stockQuantity')" />
        </div>
      </div>
    </div>

    <!-- Prescription Toggle -->
    <div class="prescription-row">
      <label>Requires Prescription:</label>
      <div class="track" [class.active]="form.get('requiresPrescription')?.value" (click)="togglePrescription()">
        <div class="knob"></div>
        <span class="label-on">Yes</span>
      </div>
    </div>

    <div *ngIf="apiError" class="api-error">
      <i class="fas fa-exclamation-circle"></i> {{ apiError }}
    </div>
    <div *ngIf="success" class="api-success">
      <i class="fas fa-check-circle"></i> Medicine {{ isEdit ? 'updated' : 'added' }} successfully!
    </div>
  </form>

  <div class="submit-row">
    <button class="btn-outline" type="button" (click)="cancel()">
      <i class="fas fa-arrow-left"></i> Back
    </button>
    <button class="btn-primary" type="button" [disabled]="submitting" (click)="submit()">
      <span *ngIf="!submitting">{{ isEdit ? 'Update' : 'Add' }} medicine <i class="fas fa-chevron-right"></i></span>
      <span *ngIf="submitting"><i class="fas fa-spinner fa-spin"></i> Saving...</span>
    </button>
  </div>
</div>
